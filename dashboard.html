<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Forum Event Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  /* ===== Top Bar ===== */
  .topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; flex-wrap: wrap; gap: 8px; }
  .topbar h1 { font-size: 1rem; font-weight: 700; color: #f1f5f9; letter-spacing: 0.5px; }
  .topbar .meta { font-size: 0.75rem; color: #64748b; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .config-btn { background: #334155; border: none; color: #94a3b8; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
  .config-btn:hover { background: #475569; color: #e2e8f0; }

  /* ===== Layout ===== */
  .page { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

  /* ===== Summary Cards ===== */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .sum-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; text-align: center; }
  .sum-card .num { font-size: 2.4rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .sum-card .lbl { font-size: 0.73rem; color: #94a3b8; font-weight: 500; }
  .sum-card.green .num  { color: #22c55e; }
  .sum-card.blue .num   { color: #60a5fa; }
  .sum-card.amber .num  { color: #fbbf24; }
  .sum-card.purple .num { color: #a78bfa; }

  /* Progress bar */
  .progress-wrap { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; }
  .prog-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; }
  .progress-bar-bg   { background: #334155; border-radius: 99px; height: 14px; overflow: hidden; }
  .progress-bar-fill { background: linear-gradient(90deg, #2563eb, #22c55e); height: 100%; border-radius: 99px; transition: width 1s ease; }

  /* ===== Section header ===== */
  .sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sec-hdr h2 { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
  .badge-count { background: #334155; color: #94a3b8; font-size: 0.7rem; font-weight: bold; padding: 2px 8px; border-radius: 99px; }
  .badge-warn  { background: #7c3aed33; color: #a78bfa; font-size: 0.7rem; font-weight: bold; padding: 2px 8px; border-radius: 99px; }

  /* ===== Check-in Table (TOP) ===== */
  .table-wrap { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; margin-bottom: 28px; }
  .table-toolbar { padding: 14px 16px; border-bottom: 1px solid #334155; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .table-toolbar input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 8px 14px; border-radius: 8px; font-size: 0.9rem; outline: none; flex: 1; min-width: 200px; }
  .table-toolbar input:focus { border-color: #2563eb; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .tbl th { padding: 10px 14px; background: #0f172a; color: #64748b; font-weight: 600; text-align: left; border-bottom: 1px solid #334155; white-space: nowrap; }
  .tbl td { padding: 10px 14px; border-bottom: 1px solid #0f172a; vertical-align: middle; color: #cbd5e1; }
  .tbl tr:hover td { background: #1a2a40; }
  .tbl tr:last-child td { border-bottom: none; }
  .name-bold { font-weight: 700; color: #f1f5f9; }
  .time-green { color: #4ade80; font-family: monospace; font-size: 0.78rem; font-weight: bold; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
  .pill-speaker    { background: #f97316; color: #fff; }
  .pill-roundtable { background: #22c55e; color: #fff; }
  .pill-participant { background: #e2e8f0; color: #0f172a; }
  .pill-default    { background: #334155; color: #94a3b8; }
  .empty-cell { text-align: center; padding: 32px !important; color: #475569; }

  /* ===== Two-col ===== */
  .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 28px; }
  @media (max-width: 960px) { .two-col { grid-template-columns: 1fr; } }

  /* ===== VIP/Speaker Cards (LARGER) ===== */
  .vip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .vip-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 14px;
    padding: 16px 12px; display: flex; flex-direction: column; align-items: center;
    text-align: center; position: relative; overflow: hidden; transition: transform 0.15s;
  }
  .vip-card:hover { transform: translateY(-2px); }
  .vip-card.present { border-color: #22c55e55; background: #042f1a; }
  .vip-card.absent  { border-color: #ef444455; }

  /* Photo — bigger */
  .photo-wrap {
    width: 96px; height: 96px; border-radius: 50%; overflow: hidden;
    margin-bottom: 10px; background: #334155; flex-shrink: 0;
    border: 3px solid #475569; cursor: pointer; transition: border-color 0.2s;
  }
  .vip-card.present .photo-wrap { border-color: #22c55e; }
  .vip-card.absent  .photo-wrap { border-color: #ef4444; }
  .photo-wrap:hover { border-color: #60a5fa; }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .initials { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 800; color: #94a3b8; }

  .vip-name { font-size: 0.88rem; font-weight: 700; color: #f1f5f9; margin-bottom: 3px; line-height: 1.3; }
  .vip-org  { font-size: 0.7rem;  color: #64748b; margin-bottom: 8px; line-height: 1.3; }
  .status-pill { font-size: 0.72rem; font-weight: bold; padding: 3px 12px; border-radius: 99px; }
  .vip-card.present .status-pill { background: #166534; color: #4ade80; }
  .vip-card.absent  .status-pill { background: #450a0a; color: #f87171; }
  .vip-pos  { font-size: 0.68rem; color: #60a5fa; margin-bottom: 6px; line-height: 1.3; font-style: italic; }
  .time-badge { font-size: 0.68rem; color: #4ade80; margin-top: 5px; font-family: monospace; }
  .role-tag { position: absolute; top: 8px; right: 8px; font-size: 0.6rem; font-weight: bold; padding: 2px 7px; border-radius: 4px; }
  .role-tag.speaker    { background: #f97316; color: #fff; }
  .role-tag.roundtable { background: #22c55e; color: #fff; }
  .role-tag.vip        { background: #a78bfa; color: #fff; }

  /* ===== Chart box ===== */
  .chart-box { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px; }
  .chart-box canvas { display: block; }

  /* ===== Lightbox ===== */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: none; align-items: center; justify-content: center; z-index: 300;
    flex-direction: column; gap: 12px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 70vw; max-height: 70vh; min-width: 300px; border-radius: 16px; border: 3px solid #475569; object-fit: contain; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
  .lightbox .lb-name { color: #f1f5f9; font-size: 1.1rem; font-weight: 700; }
  .lightbox .lb-pos  { color: #60a5fa; font-size: 0.85rem; font-style: italic; margin-top: 2px; }
  .lightbox .lb-org  { color: #94a3b8; font-size: 0.85rem; }
  .lightbox .lb-close { position: absolute; top: 20px; right: 24px; background: #334155; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .lightbox .lb-close:hover { background: #ef4444; }

  /* ===== Config Modal ===== */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal-bg.open { display: flex; }
  .modal { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; width: 100%; max-width: 440px; margin: 16px; }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: #f1f5f9; }
  .modal label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px; }
  .modal input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 14px; outline: none; }
  .modal input:focus { border-color: #2563eb; }
  .modal-btns { display: flex; gap: 8px; }
  .btn-save   { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; }
  .btn-cancel { background: #334155; color: #94a3b8; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .btn-save:hover   { background: #1d4ed8; }
  .btn-cancel:hover { background: #475569; }

  .spinner-wrap { text-align: center; padding: 80px 20px; color: #475569; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <h1>National Forum Event Dashboard</h1>
  <div class="meta">
    <span><span class="live-dot"></span> LIVE</span>
    <span id="updateTime">--:--:--</span>
    <span id="countdownBadge" style="color:#fbbf24;">refresh in 30s</span>
    <button class="config-btn" onclick="openConfig()" style="display:none;">⚙️ ตั้งค่า API</button>
  </div>
</div>

<!-- Main -->
<div class="page" id="mainContent">
  <div class="spinner-wrap" id="loadingMsg">
    <div style="font-size:2.5rem;margin-bottom:12px;">⏳</div>
    <div style="font-size:1rem;">กำลังโหลดข้อมูล...</div>
    <div style="font-size:0.8rem;margin-top:8px;color:#334155;">กรุณาตั้งค่า API URL ก่อนใช้งาน</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-name" id="lbName"></div>
  <div class="lb-pos"  id="lbPos"></div>
  <div class="lb-org"  id="lbOrg"></div>
</div>

<!-- Config Modal -->
<div class="modal-bg" id="configModal">
  <div class="modal">
    <h3>⚙️ ตั้งค่า API URL</h3>
    <label>Apps Script URL</label>
    <input type="text" id="apiInput" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="modal-btns">
      <button class="btn-save" onclick="saveConfig()">💾 บันทึก</button>
      <button class="btn-cancel" onclick="closeConfig()">ยกเลิก</button>
    </div>
  </div>
</div>

<script>
  var API_URL = 'https://script.google.com/macros/s/AKfycbxdpVWI_UBafeEpk9RrXALEwYzQ21sgFClzUg3akKZq6_mrOHGEXdyldIe5rWOiBKgQAQ/exec';
  var refreshTimer = 30;
  var countdownInterval = null;
  var rawData = null;
  var currentFilter = '';

  window.addEventListener('load', function() {
    fetchData();
    startCountdown();
  });

  // ===== Config =====
  function openConfig()  { document.getElementById('configModal').classList.add('open'); }
  function closeConfig() { document.getElementById('configModal').classList.remove('open'); }
  function saveConfig() {
    var url = document.getElementById('apiInput').value.trim();
    if (!url) return;
    localStorage.setItem('dashboard_api_url', url);
    API_URL = url;
    closeConfig();
    fetchData();
    startCountdown();
  }

  // ===== Fetch =====
  function fetchData() {
    if (!API_URL) return;
    fetch(API_URL + '?action=dashboard', { redirect: 'follow' })
      .then(function(r) { return r.json(); })
      .then(function(data) { rawData = data; render(data); resetCountdown(); })
      .catch(function(err) {
        document.getElementById('loadingMsg').innerHTML =
          '<div style="color:#f87171;padding:40px;text-align:center;">❌ โหลดข้อมูลไม่ได้<br><small style="color:#475569;">' + err.message + '</small><br><br><button onclick="openConfig()" style="background:#2563eb;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;">ตั้งค่า API</button></div>';
      });
  }

  function startCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);
    refreshTimer = 30;
    countdownInterval = setInterval(function() {
      refreshTimer--;
      document.getElementById('countdownBadge').textContent = 'refresh in ' + refreshTimer + 's';
      if (refreshTimer <= 0) { fetchData(); }
    }, 1000);
  }
  function resetCountdown() {
    refreshTimer = 30;
    document.getElementById('countdownBadge').textContent = 'refresh in 30s';
  }

  // ===== Render =====
  function render(d) {
    document.getElementById('updateTime').textContent = d.summary.updatedAt;
    var pct = d.summary.pctCheckedIn;
    var html = '';

    // ── Summary cards ──
    html += '<div class="summary-grid">';
    html += sumCard(d.summary.totalRegistered, 'ลงทะเบียนทั้งหมด', 'blue');
    html += sumCard(d.summary.totalConfirmed,  'ยืนยันแล้ว', 'amber');
    html += sumCard(d.summary.totalCheckedIn,  'เช็คอินแล้ว', 'green');
    html += sumCard(d.vipCheckedIn + ' / ' + d.vipSpeakers.length, 'VIP+Speaker มา/ทั้งหมด', 'purple');
    html += '</div>';

    // ── Progress bar ──
    html += '<div class="progress-wrap">';
    html += '<div class="prog-label"><span>อัตราการเข้าร่วม (Check-in Rate)</span>';
    html += '<span style="color:#f1f5f9;font-weight:bold;">' + d.summary.totalCheckedIn + ' / ' + d.summary.totalRegistered + ' (' + pct + '%)</span></div>';
    html += '<div class="progress-bar-bg"><div class="progress-bar-fill" id="progFill" style="width:0%"></div></div>';
    html += '</div>';

    // ── Check-in table (TOP) ──
    html += '<div class="sec-hdr"><h2>รายการเช็คอิน</h2>';
    html += '<span class="badge-count">' + d.allCheckins.length + ' คน</span></div>';
    html += '<div class="table-wrap">';
    html += '<div class="table-toolbar">';
    html += '<input type="text" id="filterInput" placeholder="🔍 ค้นหาชื่อ / องค์กร..." oninput="filterTable(this.value)">';
    html += '</div>';
    html += '<div style="overflow-x:auto;">';
    html += '<table class="tbl"><thead><tr>';
    html += '<th>#</th><th>ชื่อ</th><th>องค์กร</th><th>Badge / Role</th><th>เวลาเช็คอิน</th><th>Dietary</th><th>Breakout</th>';
    html += '</tr></thead><tbody id="tableBody">';
    html += buildTableRows(d.allCheckins, '');
    html += '</tbody></table></div></div>';

    // ── Two-col: VIP cards + Charts ──
    html += '<div class="two-col">';

    // VIP/Speaker
    html += '<div>';
    html += '<div class="sec-hdr"><h2>VIP &amp; Speaker</h2>';
    html += '<span class="badge-warn">' + d.vipCheckedIn + '/' + d.vipSpeakers.length + ' มาแล้ว</span></div>';
    html += '<div style="width:100%;">';
    if (d.vipSpeakers.length === 0) {
      html += '<div style="color:#475569;font-size:0.85rem;padding:16px;grid-column:1/-1;">ไม่พบ VIP / Speaker<br><small>ตรวจสอบคอลัมน์ Badge (I) ใน Sheet<br>ต้องมีคำว่า VIP, Speaker หรือ Roundtable</small></div>';
    }

    // แบ่งกลุ่ม
    var groups = [
      { key: 'vip',        label: 'VIP',        color: '#a78bfa', items: [] },
      { key: 'speaker',    label: 'Speaker',    color: '#f97316', items: [] },
      { key: 'roundtable', label: 'Roundtable', color: '#22c55e', items: [] }
    ];
    d.vipSpeakers.forEach(function(p) {
      var bl = (p.badge||'').toLowerCase();
      if      (bl.includes('vip'))        groups[0].items.push(p);
      else if (bl.includes('speaker'))    groups[1].items.push(p);
      else if (bl.includes('roundtable')) groups[2].items.push(p);
    });

    groups.forEach(function(g) {
      if (g.items.length === 0) return;
      var arrived = g.items.filter(function(p){ return p.checkedIn; }).length;
      html += '<div style="grid-column:1/-1; margin:4px 0 8px;">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">';
      html += '<span style="background:' + g.color + '22;color:' + g.color + ';font-size:0.75rem;font-weight:bold;padding:3px 12px;border-radius:99px;border:1px solid ' + g.color + '44;">' + g.label + '</span>';
      html += '<span style="font-size:0.75rem;color:#64748b;">' + arrived + ' / ' + g.items.length + ' มาแล้ว</span>';
      html += '</div>';
      html += '<div class="vip-grid">';
      g.items.forEach(function(p, idx) {
        var globalIdx = d.vipSpeakers.indexOf(p);
        var cls     = p.checkedIn ? 'present' : 'absent';
        var roleTag = getRoleTag(p.badge);
        var ini     = getInitials(p.name);
        var timeStr = p.checkedIn ? extractTime(p.attendance) : '';
        html += '<div class="vip-card ' + cls + '">';
        html += '<span class="role-tag ' + roleTag.cls + '">' + roleTag.label + '</span>';
        html += '<div class="photo-wrap" onclick="openLightbox(' + globalIdx + ')" title="คลิกเพื่อขยาย">';
        if (p.photoUrl) {
          html += '<img src="' + escHtml(p.photoUrl) + '" onerror="handleImgErr(this)" alt="">';
        } else {
          html += '<div class="initials">' + ini + '</div>';
        }
        html += '</div>';
        html += '<div class="vip-name">' + escHtml(p.name) + '</div>';
        if (p.position) html += '<div class="vip-pos">' + escHtml(p.position) + '</div>';
        html += '<div class="vip-org">'  + escHtml(p.org || '-') + '</div>';
        if (p.checkedIn) {
          html += '<div class="status-pill">&#10003; มาแล้ว</div>';
          if (timeStr) html += '<div class="time-badge">' + timeStr + '</div>';
        } else {
          html += '<div class="status-pill">&#8987; ยังไม่มา</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';
    });
    html += '</div></div>';

    // Charts — badge breakdown
    html += '<div>';
    html += '<div class="chart-box">';
    html += '<div class="sec-hdr" style="margin-bottom:14px;"><h2>Check-in แยกตาม Badge</h2></div>';
    html += '<canvas id="badgeChart" style="max-height:260px;"></canvas>';
    html += '<div id="badgeLegend" style="margin-top:14px;"></div>';
    html += '</div></div>';

    html += '</div>'; // end two-col

    document.getElementById('mainContent').innerHTML = html;

    // Animate progress
    setTimeout(function() {
      var el = document.getElementById('progFill');
      if (el) el.style.width = pct + '%';
    }, 100);

    drawCharts(d);
  }

  // ===== Table helpers =====
  function buildTableRows(rows, filter) {
    var q = filter.toLowerCase();
    var filtered = q ? rows.filter(function(r) {
      return (r.name||'').toLowerCase().includes(q) || (r.org||'').toLowerCase().includes(q);
    }) : rows;

    if (filtered.length === 0) {
      return '<tr><td colspan="7" class="empty-cell">ไม่พบข้อมูล</td></tr>';
    }
    return filtered.map(function(r, i) {
      var time = r.attendance ? extractTime(r.attendance) : '-';
      return '<tr>' +
        '<td style="color:#475569;">' + (i+1) + '</td>' +
        '<td class="name-bold">' + escHtml(r.name) + '</td>' +
        '<td>' + escHtml(r.org||'-') + '</td>' +
        '<td>' + getBadgePill(r.badge) + '</td>' +
        '<td class="time-green">' + time + '</td>' +
        '<td style="font-size:0.78rem;">' + escHtml(r.dietary||'-') + '</td>' +
        '<td style="font-size:0.78rem;">' + escHtml(r.breakout||'-') + '</td>' +
        '</tr>';
    }).join('');
  }

  function filterTable(val) {
    currentFilter = val;
    if (!rawData) return;
    var tbody = document.getElementById('tableBody');
    if (tbody) tbody.innerHTML = buildTableRows(rawData.allCheckins, val);
  }

  function sumCard(num, lbl, color) {
    return '<div class="sum-card ' + color + '"><div class="num">' + num + '</div><div class="lbl">' + lbl + '</div></div>';
  }

  // ===== Charts =====
  function drawCharts(d) {
    // Badge breakdown chart
    var bCtx = document.getElementById('badgeChart');
    if (bCtx && d.badgeStats && d.badgeStats.length > 0) {
      if (window._badgeChart) window._badgeChart.destroy();

      var BADGE_COLORS = {
        vip:        { checked: '#a78bfa', bg: '#7c3aed44' },
        speaker:    { checked: '#f97316', bg: '#ea580c44' },
        roundtable: { checked: '#22c55e', bg: '#16a34a44' },
        participant:{ checked: '#60a5fa', bg: '#2563eb44' }
      };

      function getBadgeColor(badge, type) {
        var bl = (badge||'').toLowerCase();
        var key = bl.includes('vip') ? 'vip' : bl.includes('speaker') ? 'speaker' : bl.includes('roundtable') ? 'roundtable' : 'participant';
        return BADGE_COLORS[key][type];
      }

      var labels   = d.badgeStats.map(function(s){ return s.badge; });
      var checked  = d.badgeStats.map(function(s){ return s.checkedIn; });
      var notYet   = d.badgeStats.map(function(s){ return s.total - s.checkedIn; });
      var checkedColors = d.badgeStats.map(function(s){ return getBadgeColor(s.badge, 'checked'); });
      var bgColors      = d.badgeStats.map(function(s){ return getBadgeColor(s.badge, 'bg'); });

      window._badgeChart = new Chart(bCtx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'เช็คอินแล้ว', data: checked, backgroundColor: checkedColors, borderRadius: 4, stack: 'a' },
            { label: 'ยังไม่เช็คอิน', data: notYet, backgroundColor: bgColors, borderRadius: 0, stack: 'a' }
          ]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var s = d.badgeStats[ctx.dataIndex];
                  if (ctx.datasetIndex === 0) return 'เช็คอินแล้ว: ' + s.checkedIn + ' คน (' + s.pct + '%)';
                  return 'ยังไม่เช็คอิน: ' + (s.total - s.checkedIn) + ' คน';
                }
              }
            }
          },
          scales: {
            x: { stacked: true, ticks: { color: '#64748b', font: { size: 11 } }, grid: { color: '#1e293b' } },
            y: { stacked: true, ticks: { color: '#e2e8f0', font: { size: 12 } }, grid: { display: false } }
          }
        }
      });

      // Legend แสดง % แต่ละ badge
      var legHtml = '';
      d.badgeStats.forEach(function(s) {
        var col = getBadgeColor(s.badge, 'checked');
        legHtml += '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b;">';
        legHtml += '<div style="display:flex;align-items:center;gap:8px;">';
        legHtml += '<span style="width:10px;height:10px;border-radius:2px;background:' + col + ';display:inline-block;flex-shrink:0;"></span>';
        legHtml += '<span style="font-size:0.8rem;color:#e2e8f0;">' + escHtml(s.badge) + '</span>';
        legHtml += '</div>';
        legHtml += '<span style="font-size:0.8rem;color:#94a3b8;">' + s.checkedIn + '/' + s.total;
        legHtml += ' &nbsp;<strong style="color:' + col + ';">' + s.pct + '%</strong></span>';
        legHtml += '</div>';
      });
      var legEl = document.getElementById('badgeLegend');
      if (legEl) legEl.innerHTML = legHtml;
    }
  }

  // ===== Lightbox =====
  function openLightbox(idx) {
    if (!rawData || !rawData.vipSpeakers[idx]) return;
    var p = rawData.vipSpeakers[idx];
    if (!p.photoUrl) return;
    document.getElementById('lbImg').src  = p.photoUrl;
    document.getElementById('lbName').textContent = p.name;
    document.getElementById('lbPos').textContent  = p.position || '';
    document.getElementById('lbOrg').textContent  = p.org || '';
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox(e) {
    if (!e || e.target === document.getElementById('lightbox') || e.currentTarget.classList.contains('lb-close')) {
      document.getElementById('lightbox').classList.remove('open');
    }
  }

  // ===== Helpers =====
  function getRoleTag(badge) {
    var b = (badge||'').toLowerCase();
    if (b.includes('speaker'))    return { cls:'speaker',    label:'Speaker' };
    if (b.includes('roundtable')) return { cls:'roundtable', label:'Roundtable' };
    return { cls:'vip', label: badge || 'VIP' };
  }

  function getBadgePill(badge) {
    var b = (badge||'').toLowerCase();
    if (b.includes('speaker'))     return '<span class="pill pill-speaker">Speaker</span>';
    if (b.includes('roundtable'))  return '<span class="pill pill-roundtable">Roundtable</span>';
    if (b.includes('participant')) return '<span class="pill pill-participant">Participant</span>';
    return '<span class="pill pill-default">' + escHtml(badge||'-') + '</span>';
  }

  function getInitials(name) {
    var parts = (name||'').trim().split(' ');
    if (parts.length >= 2) return (parts[0][0]||'') + (parts[1][0]||'');
    return (name[0]||'?').toUpperCase();
  }

  function extractTime(att) {
    var m = (att||'').match(/\((\d{2}:\d{2})\)/);
    return m ? m[1] : (att||'-');
  }

  function handleImgErr(img) {
    img.style.display = 'none';
    var wrap = img.parentElement;
    var ini = document.createElement('div');
    ini.className = 'initials';
    ini.textContent = '?';
    wrap.appendChild(ini);
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
